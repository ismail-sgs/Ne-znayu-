<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>newt.editz | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #050508;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #0f0f15;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 188, 255, 0.1);
            border: 1px solid #1f1f2e;
            max-width: 400px;
            width: 90%;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #00bcff;
            box-shadow: 0 0 15px rgba(0, 188, 255, 0.3);
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 {
            font-size: 2.2em;
            margin: 0;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .tag {
            color: #00bcff;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .bio {
            font-size: 1.05em;
            line-height: 1.6;
            color: #8a8a98;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        .btn {
            display: block;
            padding: 14px 20px;
            background: linear-gradient(45deg, #00bcff, #9400d3);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Rasm joyiga siz xohlagan internetdagi ochiq rasm havolasini qo'ydim -->
        <img src="https://i.imgur.com/8PKpQs9.jpeg" alt="Newt Editz" class="profile-img">
        
        <h1>newt.editz</h1>
        <div class="tag">Video Editor</div>
        
        <p class="bio">
            Cinematic video editing and visual storytelling. High quality edits, precise cuts, and unique atmosphere in every frame.
        </p>
        
        <a href="https://instagram.com/newt.editz" target="_blank" class="btn">VISIT INSTAGRAM</a>
    </div>

</body>
</html>
