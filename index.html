<head>
    <meta charset="UTF-8">

    <title>Newt Editz | Support & Community</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d13;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            margin-bottom: 10px;
        }
        /* Ad Zones */
        .ad-zone {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed #333;
            padding: 10px 0;
            min-height: 70px;
            border-radius: 8px;
        }
        /* Donation Box Design */
        .donation-box {
            background: rgba(20, 20, 30, 0.8);
            border: 2px solid #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            border-radius: 16px;
            padding: 30px 20px;
            width: 100%;
        }
        .donation-box p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        .donation-btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px 35px;
            border-radius: 50px;
            box-shadow: 0 0 10px #ff007f, 0 0 20px #7f00ff;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .donation-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff007f, 0 0 40px #7f00ff;
        }
        /* Content Box */
        .content-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
        }
    </style>
</head>

</body>
