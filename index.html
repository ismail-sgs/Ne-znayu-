    <style>
        * {

        body {

            display: flex;

            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {

        }

        .ad-container {

            align-items: center;
            min-height: 60px;
        }

        /* PROFIL */
        .profile-card {
            text-align: center;
            margin-top: 5px;
        }
        .avatar-glow {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #00ffff, #ff007f, #7f00ff);
            padding: 2.5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .avatar-inner {
            width: 100%;
            height: 100%;
            background-color: #060709;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
        }
        .profile-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* TAB MENU */
        .tab-menu {
            display: flex;
            width: 100%;
            background-color: #101216;
            padding: 6px;
            border-radius: 12px;
            gap: 5px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #5f6c7d;
            padding: 12px 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background-color: #191c24;
            color: #ffffff;
        }

        /* SAHIFALAR */
        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LINKS */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .custom-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #101216;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .custom-link:hover {
            background-color: #191c24;
            transform: translateY(-1px);
        }
        .custom-link.main-btn {
            background: #ffffff;
            color: #060709;
            font-weight: 600;
        }
        .custom-link.main-btn:hover {
            background: #f1f5f9;
        }

        /* WORKING VIDEO PLAYER */
        .video-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #101216;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
        }
        .video-container h2 {
            font-size: 1.1rem;
            color: #00ffff;
        }
        .video-iframe-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        .video-iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* QUIZ ZONE */
        .quiz-card {
            background-color: #101216;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }
        .quiz-card h2 {
            font-size: 1.15rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .option-btn {
            background-color: #191c24;
            border: 1px solid rgba(255,255,255,0.02);
            color: #ffffff;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: left;
            transition: background 0.2s;
        }
        .option-btn:hover {
            background-color: #232834;
        }
        .score-text {
            font-size: 1.4rem;
            color: #00ffff;
            font-weight: 700;
            margin-top: 15px;
        }
        .restart-btn {
            margin-top: 20px;
            background-color: #ffffff;
            color: #060709;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

                <p style="color: #5f6c7d; font-size: 0.85rem; margin-bottom: 5px;" id="question-number">Question 1 of 10</p>

    <script>
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 10 TA MAZE RUNNER SAVOLLARI
        const quizData = [
            { question: "What is Newt's official role in the Glade?", options: ["Runner", "Second-in-Command", "Keeper of the Blood House"], correct: 1 },
            { question: "Who was the very first person to enter the Glade?", options: ["Alby", "Minho", "Newt"], correct: 0 },
            { question: "What code word is tattooed on Newt's neck by WCKD?", options: ["The Glue", "The Partner", "The Leader"], correct: 0 },
            { question: "Which weapon does Minho prefer to use?", options: ["Machete", "Spear", "Bow and Arrow"], correct: 0 },
            { question: "What happens to a Glader if they are stung by a Griever?", options: ["They turn into a Griever", "They undergo 'The Changing'", "They instantly die"], correct: 1 },
            { question: "What is the name of the final safe haven city in the Death Cure?", options: ["The Last City", "Denver", "Sanctuary"], correct: 0 },
            { question: "Who kills Chuck in the first movie/book?", options: ["Gally", "Ben", "A Griever"], correct: 0 },
            { question: "What are the mechanical monsters inside the Maze called?", options: ["Cranks", "Grievers", "Beasts"], correct: 1 },
            { question: "What is Newt's sister's name?", options: ["Teresa", "Sonya", "Harriet"], correct: 1 },
            { question: "Why is Newt immune or not immune to the Flare virus?", options: ["He is completely immune", "He is NOT immune (Subject A5)", "He has the vaccine"], correct: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuiz() {
            const quizBox = document.getElementById('quiz-box');
            if (currentQuestion < quizData.length) {
                document.getElementById('question-number').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
                document.getElementById('question-text').innerText = quizData[currentQuestion].question;
                
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';
                
                quizData[currentQuestion].options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.classList.add('option-btn');
                    button.innerText = option;
                    button.onclick = () => checkAnswer(index);
                    optionsContainer.appendChild(button);
                });
            } else {
                let rank = "Greenie 🌱";
                if(score >= 4 && score <= 6) rank = "Glader 🔨";
                if(score >= 7 && score <= 9) rank = "Expert Runner 🏃‍♂️";
                if(score === 10) rank = "Glade Leader / The Glue ⚡";
                
                quizBox.innerHTML = `
                    <h2>Quiz Completed!</h2>
                    <p class="score-text">${score} / ${quizData.length} Correct</p>
                    <p style="color: #8a8d93; margin-top: 10px;">Your Title: <strong>${rank}</strong></p>
                    <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
                `;
            }
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === quizData[currentQuestion].correct) { score++; }
            currentQuestion++;
            loadQuiz();
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('quiz-box').innerHTML = `
                <p style="color: #5f6c7d; font-size: 0.85rem; margin-bottom: 5px;" id="question-number">Question 1 of 10</p>
                <h2 id="question-text">Loading...</h2>
                <div class="quiz-options" id="options-container"></div>
            `;
            loadQuiz();
        }

        loadQuiz();
    </script>
