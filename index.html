    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #08090c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        
        /* REKLAMA JOLARI */
        .ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        /* PROFIL */
        .profile-card {
            text-align: center;
            margin-top: 5px;
        }
        .avatar-glow {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #00ffff, #ff007f, #7f00ff);
            padding: 2.5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .avatar-inner {
            width: 100%;
            height: 100%;
            background-color: #08090c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
        }
        .profile-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* TAB MENU (VKLADKALAR TIZIMI) */
        .tab-menu {
            display: flex;
            width: 100%;
            background-color: #11141a;
            padding: 6px;
            border-radius: 12px;
            gap: 5px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.02);
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #5f6c7d;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background-color: #1f242e;
            color: #ffffff;
        }

        /* SAHIFALARNI BOSHQARISH */
        .tab-content {
            display: none;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LINKEER / HOME LINKS */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .custom-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #13161c;
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: #e2e8f0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .custom-link:hover {
            background-color: #1b1f27;
            transform: translateY(-1px);
        }
        .custom-link.main-btn {
            background: #ffffff;
            color: #08090c;
            font-weight: 600;
        }
        .custom-link.main-btn:hover {
            background: #f1f5f9;
        }

        /* EDITS / VIDEO SHOWCASE */
        .video-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #13161c;
            padding: 15px;
            border-radius: 16px;
            text-align: left;
        }
        .video-container h2 {
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #00ffff;
        }
        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #08090c;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            font-size: 0.9rem;
            border: 1px dashed rgba(255,255,255,0.05);
        }

        /* QUIZ ZONE (VIKTORINA) */
        .quiz-card {
            background-color: #13161c;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .quiz-card h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .option-btn {
            background-color: #1f2430;
            border: 1px solid rgba(255,255,255,0.03);
            color: #ffffff;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: left;
            transition: background 0.2s;
        }
        .option-btn:hover {
            background-color: #2d3446;
        }
        .score-text {
            font-size: 1.3rem;
            color: #00ffff;
            font-weight: 700;
            margin-top: 15px;
        }
        .restart-btn {
            margin-top: 20px;
            background-color: #ffffff;
            color: #08090c;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

        <!-- TAB MENU NAVIGATION -->

    <!-- FUNKSIYALARI UCHUN JAVASCRIPT -->
    <script>
        // TAB ALMASHTIRISH TIZIMI
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // MAZE RUNNER O'YIN MA'LUMOTLARI
        const quizData = [
            {
                question: "What is Newt's title/role in the Glade?",
                options: ["Keeper of the Runners", "Second-in-Command", "The First Glader"],
                correct: 1
            },
            {
                question: "Who was the first female to arrive in the Glade?",
                options: ["Teresa", "Brenda", "Sonya"],
                correct: 0
            },
            {
                question: "What is the name of the organization that built the Maze?",
                options: ["WCKD", "The Right Arm", "The Creators"],
                correct: 0
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuiz() {
            const quizBox = document.getElementById('quiz-box');
            if (currentQuestion < quizData.length) {
                document.getElementById('question-number').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
                document.getElementById('question-text').innerText = quizData[currentQuestion].question;
                
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';
                
                quizData[currentQuestion].options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.classList.add('option-btn');
                    button.innerText = option;
                    button.onclick = () => checkAnswer(index);
                    optionsContainer.appendChild(button);
                });
            } else {
                // O'yin tugaganda natijani ko'rsatish
                let rank = "Glader";
                if(score === quizData.length) rank = "Elite Runner ⚡";
                
                quizBox.innerHTML = `
                    <h2>Quiz Completed!</h2>
                    <p class="score-text">Your Score: ${score} / ${quizData.length}</p>
                    <p style="color: #666d7a; margin-top: 10px;">Your Rank: <strong>${rank}</strong></p>
                    <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
                `;
            }
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === quizData[currentQuestion].correct) {
                score++;
            }
            currentQuestion++;
            loadQuiz();
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('quiz-box').innerHTML = `
                <p style="color: #666d7a; font-size: 0.85rem; margin-bottom: 5px;" id="question-number">Question 1 of 3</p>
                <h2 id="question-text">Loading...</h2>
                <div class="quiz-options" id="options-container"></div>
            `;
            loadQuiz();
        }

        // Sayt birinchi marta ochilganda o'yinni tayyorlash
        loadQuiz();
    </script>
