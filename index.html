<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>newt.editz | Official Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: linear-gradient(145deg, #0f0f15, #050508);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
            border: 1px solid #1f1f2e;
            max-width: 450px;
            width: 90%;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00bcff;
            box-shadow: 0 0 15px #00bcff;
            margin-bottom: 15px;
            object-fit: cover;
        }
        h1 {
            font-size: 2em;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #00bcff, #9400d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tag {
            color: #8a8a98;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background-color: #0b0b12;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #161622;
        }
        .stat-box h3 {
            margin: 0;
            font-size: 1.4em;
            color: #00bcff;
        }
        .stat-box p {
            margin: 5px 0 0 0;
            color: #8a8a98;
            font-size: 0.9em;
        }
        .bio {
            font-size: 1.05em;
            line-height: 1.6;
            color: #d1d1d6;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            padding: 12px 20px;
            background: linear-gradient(45deg, #00bcff, #9400d3);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 188, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0, 188, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profil rasmi o'rniga Newt yoki o'zingiz yoqtirgan rasmni keyinchalik qo'ysa bo'ladi -->
        <img src="https://via.placeholder.com/150" alt="Newt Editz" class="profile-img">
        
        <h1>newt.editz</h1>
        <div class="tag">Cinematic Video Editor</div>
        
        <div class="stats">
            <div class="stat-box">
                <h3>1.3M+</h3>
                <p>Monthly Views</p>
            </div>
            <div class="stat-box">
                <h3>4K / 8K</h3>
                <p>Quality</p>
            </div>
        </div>
        
        <p class="bio">
            Har bir kadr ortida o'zgacha hayot va kinematografiya yotadi. <br>
            Eng sara va yuqori sifatli (Ultra HD) cinematic editlar olami.
        </p>
        
        <a href="https://instagram.com/newt.editz" target="_blank" class="btn">Instagram Sahifamga O'tish</a>
    </div>

</body>
</html>
